<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="UniVerse - Messages">
  <meta name="theme-color" content="#0f0c29">
  
  <title>UniVerse - Messages</title>
  
  <!-- Styles -->
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/glassmorphism.css">
  <style>
    .chat-layout {
      display: grid;
      grid-template-columns: 350px 1fr;
      gap: 1.5rem;
      min-height: 600px;
    }

    .conversation-list {
      max-height: 70vh;
      overflow-y: auto;
    }

    .conversation-item {
      padding: 1rem;
      margin-bottom: 0.5rem;
      cursor: pointer;
      transition: all 0.3s ease;
      border-radius: var(--radius-md);
    }

    .conversation-item:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .conversation-item.active {
      background: rgba(0, 210, 255, 0.1);
      border-left: 3px solid var(--neon-cyan);
    }

    .chat-window {
      display: flex;
      flex-direction: column;
      height: 70vh;
    }

    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .message {
      max-width: 70%;
      padding: 1rem;
      border-radius: var(--radius-md);
      animation: slideIn 0.3s ease;
    }

    .message.sent {
      align-self: flex-end;
      background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
    }

    .message.received {
      align-self: flex-start;
      background: var(--glass-bg);
      backdrop-filter: blur(var(--blur-md));
      border: 1px solid var(--glass-border);
    }

    .message-input {
      display: flex;
      gap: 1rem;
      padding: 1rem;
      border-top: 1px solid var(--glass-border);
    }

    @media (max-width: 768px) {
      .chat-layout {
        grid-template-columns: 1fr;
      }
      
      .conversation-list-container {
        max-height: 300px;
      }
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <!-- Sticky Navigation -->
  <nav class="sticky-nav">
    <div class="nav-container">
      <a href="/" class="logo">
        <span class="logo-icon" style="font-size: 1.8rem;">🌌</span>
        <h1 style="margin: 0; font-size: 1.5rem;" class="gradient-text">UniVerse</h1>
      </a>
      <div class="nav-links">
        <a href="/feed.html">Feed</a>
        <a href="/chat.html" class="active">Messages</a>
        <a href="/profile.html">Profile</a>
        <a href="#" id="logoutBtn">Logout</a>
      </div>
    </div>
  </nav>

  <!-- Main Container -->
  <div class="app-container" style="padding-top: 2rem;">
    
    <h2 class="gradient-text" style="margin-bottom: 1.5rem;">Messages</h2>

    <div class="chat-layout">
      
      <!-- Conversations List -->
      <div class="glass-card conversation-list-container">
        <div style="padding: 1.5rem; border-bottom: 1px solid var(--glass-border);">
          <h3 style="margin: 0; color: var(--text-primary);">Conversations</h3>
        </div>
        
        <!-- Loading State -->
        <div id="loadingConversations" style="padding: 2rem; text-align: center;">
          <div class="glass-spinner" style="margin: 0 auto 1rem;"></div>
          <p style="color: var(--text-muted); font-size: 0.9rem;">Loading...</p>
        </div>

        <!-- Conversations -->
        <div id="conversationsList" class="conversation-list" style="display: none;">
          <!-- Conversations will be inserted here -->
        </div>

        <!-- Empty State -->
        <div id="emptyConversations" style="display: none; padding: 2rem; text-align: center;">
          <div style="font-size: 3rem; margin-bottom: 1rem;">💬</div>
          <p style="color: var(--text-muted);">No conversations yet</p>
          <p style="color: var(--text-muted); font-size: 0.85rem;">Start chatting from the marketplace!</p>
        </div>
      </div>

      <!-- Chat Window -->
      <div class="glass-card">
        <!-- No conversation selected -->
        <div id="noConversationSelected" style="display: flex; align-items: center; justify-content: center; height: 70vh; flex-direction: column;">
          <div style="font-size: 4rem; margin-bottom: 1rem;">💬</div>
          <h3 style="color: var(--text-secondary);">Select a conversation</h3>
          <p style="color: var(--text-muted);">Choose a conversation from the list to start messaging</p>
        </div>

        <!-- Chat Window (hidden initially) -->
        <div id="chatWindow" class="chat-window" style="display: none;">
          <!-- Chat Header -->
          <div style="padding: 1.5rem; border-bottom: 1px solid var(--glass-border); display: flex; align-items: center; gap: 1rem;">
            <div id="chatAvatar" style="width: 50px; height: 50px; border-radius: 50%; background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple)); display: flex; align-items: center; justify-content: center; font-size: 1.5rem;">
              👤
            </div>
            <div>
              <h3 id="chatName" style="margin: 0; color: var(--text-primary);">User Name</h3>
              <p id="chatStatus" style="margin: 0; color: var(--text-muted); font-size: 0.85rem;">Online</p>
            </div>
          </div>

          <!-- Messages Container -->
          <div id="messagesContainer" class="messages-container">
            <!-- Messages will be inserted here -->
          </div>

          <!-- Message Input -->
          <div class="message-input">
            <input 
              type="text" 
              id="messageInput" 
              placeholder="Type a message..." 
              style="flex: 1; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: var(--radius-md); padding: 1rem; color: var(--text-primary);"
            >
            <button id="sendMessageBtn" class="btn-neon" style="padding: 1rem 2rem;">
              Send
            </button>
          </div>
        </div>
      </div>

    </div>

  </div>

  <!-- Footer -->
  <footer class="app-footer">
    <p>Designed by <strong>MARSHLYTES LAB</strong></p>
  </footer>

  <!-- Scripts -->
  <script src="/js/config.js"></script>
  <script>
    // Check authentication
    const token = localStorage.getItem('authToken');
    if (!token) {
      window.location.href = '/login.html';
    }

    let currentConversationId = null;

    // Load conversations
    async function loadConversations() {
      const loadingDiv = document.getElementById('loadingConversations');
      const conversationsList = document.getElementById('conversationsList');
      const emptyState = document.getElementById('emptyConversations');

      loadingDiv.style.display = 'block';
      conversationsList.style.display = 'none';
      emptyState.style.display = 'none';

      try {
        const response = await CONFIG.api(CONFIG.ENDPOINTS.CONVERSATIONS.LIST);
        const conversations = response.data || [];

        loadingDiv.style.display = 'none';

        if (conversations.length === 0) {
          emptyState.style.display = 'block';
          return;
        }

        conversationsList.style.display = 'block';
        conversationsList.innerHTML = conversations.map(conv => createConversationItem(conv)).join('');

        // Add click handlers
        document.querySelectorAll('.conversation-item').forEach(item => {
          item.addEventListener('click', () => {
            const convId = item.dataset.id;
            selectConversation(convId, conversations.find(c => c._id === convId));
          });
        });

      } catch (error) {
        loadingDiv.style.display = 'none';
        emptyState.style.display = 'block';
        console.error('Failed to load conversations:', error);
      }
    }

    // Create conversation item HTML
    function createConversationItem(conversation) {
      const otherUser = conversation.participants?.find(p => p.user._id !== 'current_user') || {};
      const userName = otherUser.user ? `${otherUser.user.firstName} ${otherUser.user.lastName}` : 'Unknown User';
      const lastMessage = conversation.lastMessage?.content || 'No messages yet';
      const lastMessageTime = conversation.lastMessage?.sentAt ? timeAgo(conversation.lastMessage.sentAt) : '';

      return `
        <div class="conversation-item" data-id="${conversation._id}">
          <div style="display: flex; align-items: center; gap: 1rem;">
            <div style="width: 50px; height: 50px; border-radius: 50%; background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple)); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; flex-shrink: 0;">
              👤
            </div>
            <div style="flex: 1; min-width: 0;">
              <h4 style="margin: 0 0 0.25rem; color: var(--text-primary); font-size: 1rem;">${userName}</h4>
              <p style="margin: 0; color: var(--text-muted); font-size: 0.85rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
                ${lastMessage}
              </p>
            </div>
          </div>
          ${lastMessageTime ? `<div style="color: var(--text-muted); font-size: 0.75rem; margin-top: 0.5rem;">${lastMessageTime}</div>` : ''}
        </div>
      `;
    }

    // Select conversation
    function selectConversation(convId, conversation) {
      currentConversationId = convId;

      // Update active state
      document.querySelectorAll('.conversation-item').forEach(item => {
        item.classList.toggle('active', item.dataset.id === convId);
      });

      // Show chat window
      document.getElementById('noConversationSelected').style.display = 'none';
      document.getElementById('chatWindow').style.display = 'flex';

      // Update chat header
      const otherUser = conversation.participants?.find(p => p.user._id !== 'current_user') || {};
      const userName = otherUser.user ? `${otherUser.user.firstName} ${otherUser.user.lastName}` : 'Unknown User';
      document.getElementById('chatName').textContent = userName;

      // Load messages
      loadMessages(convId);
    }

    // Load messages
    async function loadMessages(convId) {
      const container = document.getElementById('messagesContainer');
      container.innerHTML = '<div style="text-align: center; color: var(--text-muted);">Loading messages...</div>';

      try {
        const response = await CONFIG.api(CONFIG.ENDPOINTS.CONVERSATIONS.GET(convId));
        const messages = response.data?.messages || [];

        if (messages.length === 0) {
          container.innerHTML = '<div style="text-align: center; color: var(--text-muted); margin: auto;">No messages yet. Start the conversation!</div>';
          return;
        }

        container.innerHTML = messages.map(msg => createMessageHTML(msg)).join('');
        container.scrollTop = container.scrollHeight;

      } catch (error) {
        container.innerHTML = '<div style="text-align: center; color: #ff6b6b;">Failed to load messages</div>';
        console.error('Failed to load messages:', error);
      }
    }

    // Create message HTML
    function createMessageHTML(message) {
      const isSent = message.sender === 'current_user_id'; // You'd compare with actual user ID
      const messageClass = isSent ? 'sent' : 'received';
      
      return `
        <div class="message ${messageClass}">
          <p style="margin: 0;">${message.content}</p>
          <div style="font-size: 0.75rem; margin-top: 0.5rem; opacity: 0.7;">
            ${formatTime(message.createdAt)}
          </div>
        </div>
      `;
    }

    // Send message
    document.getElementById('sendMessageBtn').addEventListener('click', sendMessage);
    document.getElementById('messageInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    async function sendMessage() {
      if (!currentConversationId) return;

      const input = document.getElementById('messageInput');
      const content = input.value.trim();
      
      if (!content) return;

      try {
        await CONFIG.api(CONFIG.ENDPOINTS.CONVERSATIONS.SEND_MESSAGE(currentConversationId), {
          method: 'POST',
          body: JSON.stringify({ content })
        });

        input.value = '';
        loadMessages(currentConversationId);

      } catch (error) {
        alert('Failed to send message: ' + error.message);
      }
    }

    // Helper: Time ago
    function timeAgo(date) {
      const seconds = Math.floor((new Date() - new Date(date)) / 1000);
      const intervals = {
        year: 31536000,
        month: 2592000,
        week: 604800,
        day: 86400,
        hour: 3600,
        minute: 60
      };

      for (const [unit, secondsInUnit] of Object.entries(intervals)) {
        const interval = Math.floor(seconds / secondsInUnit);
        if (interval >= 1) {
          return `${interval} ${unit}${interval > 1 ? 's' : ''} ago`;
        }
      }
      return 'just now';
    }

    // Helper: Format time
    function formatTime(date) {
      return new Date(date).toLocaleTimeString('en-US', { 
        hour: '2-digit', 
        minute: '2-digit' 
      });
    }

    // Logout
    document.getElementById('logoutBtn').addEventListener('click', (e) => {
      e.preventDefault();
      localStorage.removeItem('authToken');
      window.location.href = '/login.html';
    });

    // Load conversations on page load
    loadConversations();
  </script>
</body>
</html>
